version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: multidocs-db-1
    restart: always
    environment:
      # Прописываем ЖЕСТКО, чтобы исключить ошибку в .env
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: multidocs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_new:/var/lib/postgresql/data # МЕНЯЕМ ИМЯ VOLUME
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d multidocs"]
      interval: 5s
      timeout: 5s
      retries: 5

  multidocs:
    build: .
    container_name: multidocs-multidocs-1
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/multidocs
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: multidocs
      DATABASE_USER: user
      DATABASE_PASSWORD: password
    volumes:
      - .:/app
    restart: on-failure

volumes:
  postgres_data_new: # Новый вольюм, чтобы точно не подцепить старое